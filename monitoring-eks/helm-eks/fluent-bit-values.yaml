# fluent-bit-values.yaml
config:
  service: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

  inputs: |
    [INPUT]
        Name           tail
        Path           /var/log/containers/*.log
        Parser         docker
        Tag            kube.*
        Mem_Buf_Limit  5MB
        Skip_Long_Lines On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_processed
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

  outputs: |
    [OUTPUT]
        Name           loki
        Match          *
        Host           <central_server_ip>
        Port           3100
        Labels         job=fluent-bit, namespace=$sub['namespace_name'], pod=$sub['pod_name'], container=$sub['container_name']
        Auto_Kubernetes_Labels on

# Ensure it runs as a DaemonSet
kind: DaemonSet

# Standard Kubernetes RBAC
rbac:
  create: true
